<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🐾 Approve Rescue Request</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
        }
        h1 { color: #2e8b57; margin-top: 30px; }
        form {
            background-color: #fff;
            display: inline-block;
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 20px;
            text-align: left;
        }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input[type="text"], input[type="file"], select {
            width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;
        }
        input[type="submit"] {
            background-color: #2e8b57; color: white; border: none;
            padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px;
        }
        input[type="submit"]:hover { background-color: #246b45; }
        a { display: inline-block; margin-top: 20px; color: #2e8b57; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<h1>Approve Rescue Request</h1>

<form action="AdminApproveRescueServlet" method="post" enctype="multipart/form-data">
    <label>Rescue ID:</label>
    <input type="text" name="rescueId" placeholder="Enter Rescue ID" required>

    <label>Status:</label>
    <select name="status" required>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
    </select>

    <label>Upload Image for Adoption:</label>
    <input type="file" name="petImage" accept="image/*">

    <input type="submit" value="Approve & Add to Adoption">
</form>

<a href="ViewRescueServlet">Back to Rescue Requests</a>

</body>
</html>
