<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Pet</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #74ebd5, #9face6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.form-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
h2 { text-align: center; color: #2e8b57; }
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 12px;
    background: #2e8b57;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="form-box">
    <h2>Add Pet 🐾</h2>

    <!-- 🔥 IMPORTANT -->
    <form action="AdminAddPetServlet" method="post" enctype="multipart/form-data">
        
        <input type="text" name="name" placeholder="Pet Name" required>
        <input type="text" name="breed" placeholder="Breed" required>
        <input type="text" name="location" placeholder="Location" required>

        <input type="file" name="image" required>

        <button type="submit">Add Pet</button>
    </form>
    
    <br>
    </form>

<div style="text-align:center; margin-top:15px;">
    <a href="Admin.html" style="text-decoration:none; color:#2e8b57; font-weight:bold;">
        ← Back to Admin Dashboard
    </a>
</div>

</div>
    


</body>
</html>
